<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Transaksi - FA PPOB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="dashboard.html" class="text-2xl font-bold text-indigo-600">FA PPOB</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">
                        <i class="fas fa-arrow-left mr-2"></i>Kembali
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Riwayat Transaksi</h2>
            <p class="text-gray-600">Lihat semua transaksi PPOB dan wallet Anda</p>
        </div>

        <!-- Filter Section -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Filter Transaksi</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label for="filterType" class="block text-sm font-medium text-gray-700 mb-2">
                        Jenis Transaksi
                    </label>
                    <select id="filterType" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="">Semua Transaksi</option>
                        <option value="ppob">PPOB</option>
                        <option value="wallet">Wallet</option>
                    </select>
                </div>
                
                <div>
                    <label for="filterStatus" class="block text-sm font-medium text-gray-700 mb-2">
                        Status
                    </label>
                    <select id="filterStatus" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <option value="">Semua Status</option>
                        <option value="success">Berhasil</option>
                        <option value="pending">Pending</option>
                        <option value="failed">Gagal</option>
                        <option value="cancelled">Dibatalkan</option>
                    </select>
                </div>
                
                <div>
                    <label for="filterDateFrom" class="block text-sm font-medium text-gray-700 mb-2">
                        Dari Tanggal
                    </label>
                    <input id="filterDateFrom" type="date" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
                
                <div>
                    <label for="filterDateTo" class="block text-sm font-medium text-gray-700 mb-2">
                        Sampai Tanggal
                    </label>
                    <input id="filterDateTo" type="date" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                </div>
            </div>
            
            <div class="flex justify-end mt-4 space-x-3">
                <button id="resetFilter" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition duration-300">
                    Reset
                </button>
                <button id="applyFilter" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition duration-300">
                    Terapkan Filter
                </button>
            </div>
        </div>

        <!-- Transaction List -->
        <div class="bg-white rounded-xl shadow-md">
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-semibold text-gray-900">Daftar Transaksi</h3>
                    <div class="flex items-center space-x-2">
                        <span class="text-sm text-gray-500">Urutkan:</span>
                        <select id="sortBy" class="px-3 py-1 border border-gray-300 rounded text-sm">
                            <option value="newest">Terbaru</option>
                            <option value="oldest">Terlama</option>
                            <option value="amount_high">Nominal Tertinggi</option>
                            <option value="amount_low">Nominal Terendah</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div id="transactionList" class="divide-y divide-gray-200">
                <!-- Transactions will be loaded here -->
                <div class="p-6 text-center text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Memuat riwayat transaksi...</p>
                </div>
            </div>
            
            <!-- Pagination -->
            <div id="pagination" class="p-6 border-t border-gray-200">
                <div class="flex items-center justify-between">
                    <div class="text-sm text-gray-700">
                        Menampilkan <span id="showingFrom">1</span> sampai <span id="showingTo">10</span> dari <span id="totalTransactions">0</span> transaksi
                    </div>
                    <div class="flex space-x-2">
                        <button id="prevPage" class="px-3 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <div id="pageNumbers" class="flex space-x-1">
                            <!-- Page numbers will be generated here -->
                        </div>
                        <button id="nextPage" class="px-3 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-lg shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Detail Transaksi</h3>
                    <button id="closeDetailModal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <div id="transactionDetail" class="space-y-4">
                    <!-- Transaction details will be loaded here -->
                </div>
                
                <div class="mt-6 flex justify-end space-x-3">
                    <button id="closeDetailBtn" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition duration-300">
                        Tutup
                    </button>
                    <button id="retryTransactionBtn" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition duration-300 hidden">
                        Coba Lagi
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Export Transaksi</h3>
                    <button id="closeExportModal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="exportForm" class="space-y-4">
                    <div>
                        <label for="exportFormat" class="block text-sm font-medium text-gray-700 mb-2">
                            Format Export
                        </label>
                        <select id="exportFormat" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                            <option value="pdf">PDF</option>
                            <option value="excel">Excel</option>
                            <option value="csv">CSV</option>
                        </select>
                    </div>
                    
                    <div>
                        <label for="exportDateRange" class="block text-sm font-medium text-gray-700 mb-2">
                            Periode
                        </label>
                        <select id="exportDateRange" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                            <option value="7">7 Hari Terakhir</option>
                            <option value="30">30 Hari Terakhir</option>
                            <option value="90">3 Bulan Terakhir</option>
                            <option value="365">1 Tahun Terakhir</option>
                            <option value="custom">Periode Kustom</option>
                        </select>
                    </div>
                    
                    <div id="customDateRange" class="hidden space-y-4">
                        <div>
                            <label for="exportDateFrom" class="block text-sm font-medium text-gray-700 mb-2">
                                Dari Tanggal
                            </label>
                            <input id="exportDateFrom" type="date" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                        <div>
                            <label for="exportDateTo" class="block text-sm font-medium text-gray-700 mb-2">
                                Sampai Tanggal
                            </label>
                            <input id="exportDateTo" type="date" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-md font-medium transition duration-300">
                        <i class="fas fa-download mr-2"></i>Download
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/history.js"></script>
</body>
</html>
