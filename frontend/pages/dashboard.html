<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GameStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .text-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="../index.html" class="text-2xl font-bold text-gradient">GameStore</a>
                    </div>
                    <div class="hidden md:ml-6 md:flex md:space-x-8">
                        <a href="../index.html" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium">Beranda</a>
                        <a href="dashboard.html" class="text-gray-900 hover:text-blue-600 px-3 py-2 text-sm font-medium">Dashboard</a>
                        <a href="wallet.html" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium">Wallet</a>
                    </div>
                </div>
                <div id="navButtons" class="flex items-center space-x-4">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Header -->
    <div class="gradient-bg text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold">Dashboard</h1>
                    <p class="text-gray-200 mt-1">Selamat datang kembali, <span id="userName">User</span>!</p>
                </div>
                <div class="text-right">
                    <p class="text-gray-200">Saldo Anda</p>
                    <p class="text-2xl font-bold" id="userBalance">Rp 0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-blue-100 text-blue-600">
                        <i class="fas fa-shopping-cart text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Total Transaksi</p>
                        <p class="text-2xl font-bold" id="totalTransactions">0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-green-100 text-green-600">
                        <i class="fas fa-check-circle text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Transaksi Berhasil</p>
                        <p class="text-2xl font-bold" id="successTransactions">0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600">
                        <i class="fas fa-clock text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Pending</p>
                        <p class="text-2xl font-bold" id="pendingTransactions">0</p>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md p-6 card-hover">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-purple-100 text-purple-600">
                        <i class="fas fa-coins text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Total Pengeluaran</p>
                        <p class="text-2xl font-bold" id="totalSpent">Rp 0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold mb-4">Aksi Cepat</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <button onclick="window.location.href='../index.html#products'" class="flex flex-col items-center p-4 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors">
                    <i class="fas fa-gamepad text-2xl text-blue-600 mb-2"></i>
                    <span class="text-sm font-medium">Top Up Game</span>
                </button>
                
                <button onclick="window.location.href='../index.html#products'" class="flex flex-col items-center p-4 bg-green-50 hover:bg-green-100 rounded-lg transition-colors">
                    <i class="fas fa-mobile-alt text-2xl text-green-600 mb-2"></i>
                    <span class="text-sm font-medium">Beli Pulsa</span>
                </button>
                
                <button onclick="window.location.href='wallet.html'" class="flex flex-col items-center p-4 bg-purple-50 hover:bg-purple-100 rounded-lg transition-colors">
                    <i class="fas fa-wallet text-2xl text-purple-600 mb-2"></i>
                    <span class="text-sm font-medium">Isi Saldo</span>
                </button>
                
                <button onclick="window.location.href='../index.html#products'" class="flex flex-col items-center p-4 bg-yellow-50 hover:bg-yellow-100 rounded-lg transition-colors">
                    <i class="fas fa-bolt text-2xl text-yellow-600 mb-2"></i>
                    <span class="text-sm font-medium">Bayar PPOB</span>
                </button>
            </div>
        </div>

        <!-- Recent Transactions -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Transaksi Terbaru</h2>
                <button onclick="loadAllTransactions()" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                    Lihat Semua
                </button>
            </div>
            
            <div id="transactionsList" class="space-y-4">
                <!-- Transactions will be loaded here -->
                <div class="flex justify-center py-8">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction Detail Modal -->
    <div id="transactionModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Detail Transaksi</h2>
                <button onclick="hideTransactionModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="transactionDetail">
                <!-- Transaction details will be loaded here -->
            </div>
        </div>
    </div>

    <script src="../assets/js/api.js"></script>
    <script>
        // Dashboard specific JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            loadUserData();
            loadDashboardStats();
            loadRecentTransactions();
        });

        function checkAuth() {
            if (!gameStoreAPI.isLoggedIn()) {
                window.location.href = '../index.html';
                return;
            }
        }

        async function loadUserData() {
            try {
                const result = await gameStoreAPI.getCurrentUser();
                if (result.success) {
                    const user = result.data;
                    document.getElementById('userName').textContent = user.username;
                    document.getElementById('userBalance').textContent = gameStoreAPI.formatCurrency(user.balance || 0);
                    updateNavigation(user);
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        function updateNavigation(user) {
            const navButtons = document.getElementById('navButtons');
            navButtons.innerHTML = `
                <div class="flex items-center space-x-4">
                    <span class="text-gray-700">Saldo: ${gameStoreAPI.formatCurrency(user.balance || 0)}</span>
                    <div class="relative">
                        <button onclick="toggleUserMenu()" class="flex items-center space-x-2 text-gray-700 hover:text-blue-600">
                            <i class="fas fa-user-circle text-xl"></i>
                            <span>${user.username}</span>
                            <i class="fas fa-chevron-down text-sm"></i>
                        </button>
                        <div id="userMenu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-50">
                            <a href="dashboard.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                <i class="fas fa-tachometer-alt mr-2"></i>Dashboard
                            </a>
                            <a href="wallet.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                <i class="fas fa-wallet mr-2"></i>Wallet
                            </a>
                            <a href="#" onclick="gameStoreAPI.logout()" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">
                                <i class="fas fa-sign-out-alt mr-2"></i>Logout
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleUserMenu() {
            const menu = document.getElementById('userMenu');
            menu.classList.toggle('hidden');
        }

        async function loadDashboardStats() {
            try {
                // Load transaction stats (dummy data for now)
                document.getElementById('totalTransactions').textContent = '25';
                document.getElementById('successTransactions').textContent = '23';
                document.getElementById('pendingTransactions').textContent = '1';
                document.getElementById('totalSpent').textContent = 'Rp 500.000';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function loadRecentTransactions() {
            try {
                const result = await gameStoreAPI.getTransactionHistory(1, 5);
                
                if (result.success && result.data.transactions) {
                    displayTransactions(result.data.transactions);
                } else {
                    displayDummyTransactions();
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                displayDummyTransactions();
            }
        }

        function displayTransactions(transactions) {
            const container = document.getElementById('transactionsList');
            
            if (transactions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-receipt text-4xl mb-4"></i>
                        <p>Belum ada transaksi</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = transactions.map(transaction => `
                <div class="flex items-center justify-between p-4 border rounded-lg hover:bg-gray-50 cursor-pointer" 
                     onclick="showTransactionDetail('${transaction.id}')">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center mr-3">
                            <i class="fas fa-gamepad text-blue-600"></i>
                        </div>
                        <div>
                            <p class="font-medium">${transaction.product_name}</p>
                            <p class="text-sm text-gray-500">${gameStoreAPI.formatDate(transaction.created_at)}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-medium">${gameStoreAPI.formatCurrency(transaction.amount)}</p>
                        <span class="inline-block px-2 py-1 text-xs rounded-full ${getStatusClass(transaction.status)}">
                            ${getStatusText(transaction.status)}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        function displayDummyTransactions() {
            const dummyTransactions = [
                {
                    id: '1',
                    product_name: 'Mobile Legends 86 Diamond',
                    amount: 20000,
                    status: 'success',
                    created_at: new Date().toISOString()
                },
                {
                    id: '2',
                    product_name: 'Free Fire 70 Diamond',
                    amount: 10000,
                    status: 'success',
                    created_at: new Date(Date.now() - 86400000).toISOString()
                },
                {
                    id: '3',
                    product_name: 'Telkomsel 10K',
                    amount: 11000,
                    status: 'pending',
                    created_at: new Date(Date.now() - 172800000).toISOString()
                }
            ];
            
            displayTransactions(dummyTransactions);
        }

        function getStatusClass(status) {
            switch(status) {
                case 'success': return 'bg-green-100 text-green-800';
                case 'pending': return 'bg-yellow-100 text-yellow-800';
                case 'failed': return 'bg-red-100 text-red-800';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function getStatusText(status) {
            switch(status) {
                case 'success': return 'Berhasil';
                case 'pending': return 'Pending';
                case 'failed': return 'Gagal';
                default: return 'Unknown';
            }
        }

        function showTransactionDetail(transactionId) {
            // Show transaction detail modal
            document.getElementById('transactionModal').classList.remove('hidden');
            
            // Load transaction detail (dummy for now)
            document.getElementById('transactionDetail').innerHTML = `
                <div class="space-y-4">
                    <div class="flex justify-between">
                        <span class="text-gray-600">ID Transaksi:</span>
                        <span class="font-medium">${transactionId}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Produk:</span>
                        <span class="font-medium">Mobile Legends 86 Diamond</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Jumlah:</span>
                        <span class="font-medium">Rp 20.000</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Status:</span>
                        <span class="inline-block px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">Berhasil</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Tanggal:</span>
                        <span class="font-medium">${new Date().toLocaleDateString('id-ID')}</span>
                    </div>
                </div>
            `;
        }

        function hideTransactionModal() {
            document.getElementById('transactionModal').classList.add('hidden');
        }

        function loadAllTransactions() {
            // Redirect to transactions page or show all transactions
            alert('Fitur lihat semua transaksi akan segera hadir!');
        }

        // Close user menu when clicking outside
        document.addEventListener('click', function(e) {
            const userMenu = document.getElementById('userMenu');
            if (userMenu && !e.target.closest('.relative')) {
                userMenu.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
