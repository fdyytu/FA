<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - FA PPOB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .balance-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="dashboard.html" class="text-2xl font-bold text-indigo-600">FA PPOB</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-indigo-600 px-3 py-2 rounded-md text-sm font-medium">
                        <i class="fas fa-arrow-left mr-2"></i>Kembali
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Page Header -->
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Wallet</h2>
            <p class="text-gray-600">Kelola saldo dan transaksi keuangan Anda</p>
        </div>

        <!-- Balance Card -->
        <div class="balance-card rounded-xl p-6 text-white mb-8 card-hover">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-indigo-100 mb-2">Saldo Anda</p>
                    <h3 id="userBalance" class="text-4xl font-bold mb-4">Rp 0</h3>
                </div>
                <div class="text-right">
                    <i class="fas fa-wallet text-5xl text-white text-opacity-30"></i>
                </div>
            </div>
        </div>

        <!-- Action Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Top Up Card -->
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center mr-4">
                        <i class="fas fa-plus text-xl text-green-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">Top Up Saldo</h3>
                        <p class="text-gray-600 text-sm">Tambah saldo ke wallet Anda</p>
                    </div>
                </div>
                <div class="space-y-3">
                    <button onclick="openTopUpModal('manual')" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg font-medium transition duration-300">
                        <i class="fas fa-university mr-2"></i>Transfer Bank
                    </button>
                    <button onclick="openTopUpModal('midtrans')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg font-medium transition duration-300">
                        <i class="fas fa-credit-card mr-2"></i>Kartu Kredit/Debit
                    </button>
                </div>
            </div>

            <!-- Transfer Card -->
            <div class="bg-white rounded-xl shadow-md p-6 card-hover">
                <div class="flex items-center mb-4">
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mr-4">
                        <i class="fas fa-exchange-alt text-xl text-blue-600"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900">Transfer Saldo</h3>
                        <p class="text-gray-600 text-sm">Kirim saldo ke pengguna lain</p>
                    </div>
                </div>
                <button onclick="openTransferModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg font-medium transition duration-300">
                    <i class="fas fa-paper-plane mr-2"></i>Transfer Sekarang
                </button>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="bg-white rounded-xl shadow-md p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-900">Riwayat Transaksi Wallet</h3>
                <div class="flex space-x-2">
                    <select id="filterType" class="px-3 py-2 border border-gray-300 rounded-md text-sm">
                        <option value="">Semua Transaksi</option>
                        <option value="topup">Top Up</option>
                        <option value="transfer">Transfer</option>
                        <option value="payment">Pembayaran</option>
                    </select>
                </div>
            </div>
            
            <div id="transactionHistory" class="space-y-4">
                <!-- Transactions will be loaded here -->
                <div class="text-center py-8 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Memuat riwayat transaksi...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Up Modal -->
    <div id="topUpModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <div class="flex justify-between items-center mb-4">
                    <h3 id="topUpModalTitle" class="text-lg font-medium text-gray-900">Top Up Saldo</h3>
                    <button id="closeTopUpModal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="topUpForm" class="space-y-4">
                    <div>
                        <label for="topUpAmount" class="block text-sm font-medium text-gray-700 mb-2">
                            Jumlah Top Up
                        </label>
                        <input id="topUpAmount" name="amount" type="number" min="10000" required 
                               class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               placeholder="Minimal Rp 10.000">
                    </div>
                    
                    <!-- Manual Transfer Fields -->
                    <div id="manualFields" class="space-y-4 hidden">
                        <div>
                            <label for="bankName" class="block text-sm font-medium text-gray-700 mb-2">
                                Bank Tujuan
                            </label>
                            <select id="bankName" name="bank_name" class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                                <option value="BCA">BCA - 1234567890</option>
                                <option value="BNI">BNI - 0987654321</option>
                                <option value="BRI">BRI - 1122334455</option>
                                <option value="Mandiri">Mandiri - 5566778899</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="accountName" class="block text-sm font-medium text-gray-700 mb-2">
                                Nama Rekening Pengirim
                            </label>
                            <input id="accountName" name="account_name" type="text" 
                                   class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                   placeholder="Nama sesuai rekening">
                        </div>
                        
                        <div>
                            <label for="accountNumber" class="block text-sm font-medium text-gray-700 mb-2">
                                Nomor Rekening Pengirim
                            </label>
                            <input id="accountNumber" name="account_number" type="text" 
                                   class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                   placeholder="Nomor rekening pengirim">
                        </div>
                        
                        <div>
                            <label for="notes" class="block text-sm font-medium text-gray-700 mb-2">
                                Catatan (Opsional)
                            </label>
                            <textarea id="notes" name="notes" rows="3" 
                                      class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                      placeholder="Catatan tambahan"></textarea>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-md font-medium transition duration-300">
                        <span id="topUpButtonText">Buat Permintaan Top Up</span>
                        <i id="topUpSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Transfer Modal -->
    <div id="transferModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-full max-w-md shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Transfer Saldo</h3>
                    <button id="closeTransferModal" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="transferForm" class="space-y-4">
                    <div>
                        <label for="recipientUsername" class="block text-sm font-medium text-gray-700 mb-2">
                            Username Penerima
                        </label>
                        <input id="recipientUsername" name="recipient_username" type="text" required 
                               class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               placeholder="Masukkan username penerima">
                    </div>
                    
                    <div>
                        <label for="transferAmount" class="block text-sm font-medium text-gray-700 mb-2">
                            Jumlah Transfer
                        </label>
                        <input id="transferAmount" name="amount" type="number" min="1000" required 
                               class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                               placeholder="Minimal Rp 1.000">
                    </div>
                    
                    <div>
                        <label for="transferNotes" class="block text-sm font-medium text-gray-700 mb-2">
                            Catatan (Opsional)
                        </label>
                        <textarea id="transferNotes" name="notes" rows="3" 
                                  class="block w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                                  placeholder="Catatan transfer"></textarea>
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md font-medium transition duration-300">
                        <span id="transferButtonText">Transfer Sekarang</span>
                        <i id="transferSpinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
            <div class="mt-3 text-center">
                <div id="alertIcon" class="mx-auto flex items-center justify-center h-12 w-12 rounded-full mb-4">
                    <i id="alertIconClass" class="text-2xl"></i>
                </div>
                <h3 id="alertTitle" class="text-lg font-medium text-gray-900 mb-2"></h3>
                <p id="alertMessage" class="text-sm text-gray-500 mb-4"></p>
                <button id="alertOkButton" class="px-4 py-2 bg-indigo-600 text-white text-base font-medium rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/wallet.js"></script>
</body>
</html>
